  </text>
  <text x="80" y="400" fill="rgba(255,255,255,0.7)" font-family="Inter, Pretendard, sans-serif" font-size="34" font-weight="400" letter-spacing="-0.5">
    사람과 AI의 연결을 만드는
  </text>
  <text x="80" y="450" fill="url(#accent)" font-family="Inter, Pretendard, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5">
