<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1d30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#635bff"/>
      <stop offset="50%" stop-color="#00d4b4"/>
      <stop offset="100%" stop-color="#ff7d5c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#635bff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#635bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#00d4b4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4b4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="url(#accent)"/>
    <text x="56" y="27" fill="#fff" font-family="Inter, sans-serif" font-size="20" font-weight="700">ITCL</text>
  </g>

  <text x="80" y="310" fill="#fff" font-family="Inter, Pretendard, sans-serif" font-size="70" font-weight="700" letter-spacing="-2">
