<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>관리자 로그인 · ITCL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/styles.css" />
  <link rel="stylesheet" href="../../assets/admin.css" />
</head>
<body>
  <div class="admin-login">
    <form class="admin-login-card" id="loginForm">
      <div class="admin-login-brand">
        <span class="logo-mark"></span>
        ITCL 관리자
      </div>
      <h1>로그인</h1>
      <p class="sub">비밀번호를 입력하세요.</p>

      <div class="form-field">
        <label for="pw">비밀번호</label>
        <input type="password" id="pw" name="pw" required autocomplete="current-password" autofocus />
      </div>

      <div id="err" class="alert error" style="display:none;"></div>

      <button type="submit" class="btn primary" style="width:100%; justify-content:center; margin-top:8px;">
        로그인
      </button>

      <div style="margin-top:24px; font-size:12px; color:var(--muted); text-align:center;">
        비밀번호를 모르면 Vercel 환경변수(ADMIN_PASSWORD)를 확인하세요.
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      const pw = document.getElementById('pw').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          location.href = '/pages/admin/dashboard.html';
        } else {
          err.textContent = data.error || '로그인 실패';
          err.style.display = 'block';
        }
      } catch (ex) {
        err.textContent = ex.message || '네트워크 오류';
        err.style.display = 'block';
      }
    });

    // 이미 로그인 상태면 대시보드로
    fetch('/api/admin/session', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(d => { if (d.authenticated) location.href = '/pages/admin/dashboard.html'; })
      .catch(() => {});
  </script>
</body>
</html>
