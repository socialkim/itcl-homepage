<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>관리자 이메일 · ITCL 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/styles.css" />
  <link rel="stylesheet" href="../../assets/admin.css" />
  <script>window.ITCL_ADMIN_BASE='..';</script>
</head>
<body>
  <main class="admin-main">
    <h1 class="page-h1">관리자 이메일</h1>
    <p class="page-sub">문의가 들어오면 자동으로 알림을 받는 이메일 목록. 여러 명에게 동시 발송됩니다.</p>

    <div class="alert info">
      💡 활성(is_active=true) 상태인 이메일에만 알림이 발송됩니다. 비활성화하면 임시로 발송 중단 가능.
      모든 이메일이 비활성이면 하드코딩 fallback(itcl_sns@, kimdukjin@)이 사용됩니다.
    </div>

    <div class="card">
      <h2>새 이메일 추가</h2>
      <form id="addForm">
        <div class="form-row">
          <div class="form-field">
            <label>이메일</label>
            <input type="email" id="email" required placeholder="name@itcl.kr" />
          </div>
          <div class="form-field">
            <label>라벨 (용도)</label>
            <input type="text" id="label" placeholder="예: 영업팀, 소장" />
          </div>
          <div class="form-field">
            <label>표시 순서</label>
            <input type="number" id="order" value="100" />
          </div>
        </div>
        <button type="submit" class="btn primary">추가</button>
      </form>
    </div>

    <div class="card">
      <h2>현재 등록된 이메일</h2>
      <div id="list">로드 중...</div>
    </div>
  </main>

  <script src="../../assets/admin.js"></script>
  <script>
    (async () => {
      if (!(await ITCL_checkSession())) return;
      ITCL_renderShell('emails');

      async function refresh() {
        try {
          const { items = [] } = await ITCL_api('/api/admin/emails');
          if (!items.length) {
            document.getElementById('list').innerHTML = '<div style="color:var(--muted); font-size:13px;">등록된 이메일이 없습니다.</div>';
            return;
          }
          document.getElementById('list').innerHTML = `
            <table class="table">
              <thead><tr><th>순서</th><th>이메일</th><th>라벨</th><th>활성</th><th>등록일</th><th>작업</th></tr></thead>
              <tbody>
                ${items.map(it => `
                  <tr>
                    <td>${it.display_order}</td>
                    <td><strong>${ITCL_esc(it.email)}</strong></td>
                    <td>${ITCL_esc(it.label || '')}</td>
                    <td>${it.is_active ? '<span class="badge published">활성</span>' : '<span class="badge draft">비활성</span>'}</td>
                    <td style="font-size:12px;color:var(--muted);">${ITCL_fmtDate(it.created_at)}</td>
                    <td>
                      <div class="actions">
                        <button class="btn small secondary" data-toggle="${it.id}" data-active="${it.is_active}">${it.is_active ? '비활성화' : '활성화'}</button>
                        <button class="btn small danger" data-del="${it.id}">삭제</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;

          // actions
          document.querySelectorAll('[data-del]').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (!confirm('정말 삭제하시겠습니까?')) return;
              try {
                await ITCL_api('/api/admin/emails', { method: 'DELETE', query: { id: btn.dataset.del } });
                ITCL_toast('삭제됨', 'success');
                refresh();
              } catch (e) { ITCL_toast(e.message, 'error'); }
            });
          });
          document.querySelectorAll('[data-toggle]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const curActive = btn.dataset.active === 'true';
              try {
                await ITCL_api('/api/admin/emails', { method: 'PUT', query: { id: btn.dataset.toggle }, body: { is_active: !curActive } });
                ITCL_toast('변경됨', 'success');
                refresh();
              } catch (e) { ITCL_toast(e.message, 'error'); }
            });
          });
        } catch (e) {
          document.getElementById('list').innerHTML = `<div class="alert error">${ITCL_esc(e.message)}</div>`;
        }
      }

      document.getElementById('addForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          email: document.getElementById('email').value,
          label: document.getElementById('label').value,
          display_order: parseInt(document.getElementById('order').value) || 100,
        };
        try {
          await ITCL_api('/api/admin/emails', { method: 'POST', body });
          ITCL_toast('추가됨', 'success');
          document.getElementById('addForm').reset();
          refresh();
        } catch (err) { ITCL_toast(err.message, 'error'); }
      });

      refresh();
    })();
  </script>
</body>
</html>
