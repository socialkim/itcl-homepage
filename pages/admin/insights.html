<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>인사이트 칼럼 · ITCL 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/styles.css" />
  <link rel="stylesheet" href="../../assets/admin.css" />
  <script>window.ITCL_ADMIN_BASE='..';</script>
  <style>
    .editor-grid { display:grid; grid-template-columns: 1fr 280px; gap:24px; }
    @media (max-width:1000px){ .editor-grid { grid-template-columns: 1fr; } }
    .side-panel .form-field { margin-bottom: 14px; }
    .md-editor { min-height: 500px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.65; }
  </style>
</head>
<body>
  <main class="admin-main">
    <div id="view-list">
      <h1 class="page-h1">인사이트 칼럼</h1>
      <p class="page-sub">게시된 글과 초안을 관리합니다. 김덕진 소장 문체로 작성. body는 마크다운.</p>

      <div class="btn-group" style="margin-bottom:20px;">
        <button class="btn primary" id="newBtn">+ 새 글 작성</button>
      </div>

      <div class="card" style="padding:0;">
        <div id="listWrap"><div style="padding:20px;color:var(--muted);">로드 중...</div></div>
      </div>
    </div>

    <div id="view-editor" style="display:none;">
      <h1 class="page-h1" id="editorTitle">글 작성</h1>
      <p class="page-sub">작성 후 상단 우측에서 발행 설정을 확인하세요.</p>

      <div class="editor-grid">
        <div>
          <div class="card">
            <div class="form-field">
              <label>제목</label>
              <input type="text" id="f_title" placeholder="글 제목" required />
            </div>
            <div class="form-field">
              <label>요약 (excerpt, 카드·메타에 노출, 120자 내외)</label>
              <textarea id="f_excerpt" rows="2"></textarea>
            </div>
            <div class="form-field">
              <label>본문 (Markdown)</label>
              <textarea id="f_body" class="md-editor" placeholder="## 소제목

본문 내용..."></textarea>
              <div class="hint">Markdown 지원. 빈 줄로 문단 구분. h2/h3는 ## / ###</div>
            </div>
          </div>
        </div>
        <aside class="side-panel">
          <div class="card">
            <h2>발행</h2>
            <div class="form-field checkbox">
              <input type="checkbox" id="f_published" />
              <label for="f_published">공개 상태로 발행</label>
            </div>
            <div class="form-field checkbox">
              <input type="checkbox" id="f_featured" />
              <label for="f_featured">피처드(상단 강조)</label>
            </div>
            <div class="btn-group" style="margin-top:14px; flex-direction:column; align-items:stretch;">
              <button class="btn primary" id="saveBtn">저장</button>
              <button class="btn secondary" id="backBtn">← 목록으로</button>
              <button class="btn danger" id="deleteBtn" style="display:none;">삭제</button>
            </div>
          </div>
          <div class="card">
            <h2>메타 정보</h2>
            <div class="form-field">
              <label>Slug (URL용)</label>
              <input type="text" id="f_slug" placeholder="자동 생성됨" />
            </div>
            <div class="form-field">
              <label>카테고리</label>
              <select id="f_category">
                <option value="trend">trend · 트렌드</option>
                <option value="tool">tool · 도구</option>
                <option value="case">case · 사례</option>
                <option value="strategy">strategy · 전략</option>
                <option value="research">research · 리서치</option>
              </select>
            </div>
            <div class="form-field">
              <label>저자 이름</label>
              <input type="text" id="f_author_name" value="김덕진" />
            </div>
            <div class="form-field">
              <label>저자 이니셜</label>
              <input type="text" id="f_author_init" value="KD" maxlength="3" />
            </div>
            <div class="form-field">
              <label>읽는 시간(분)</label>
              <input type="number" id="f_read_min" value="5" min="1" max="60" />
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="../../assets/admin.js"></script>
  <script>
    (async () => {
      if (!(await ITCL_checkSession())) return;
      ITCL_renderShell('insights');

      let editingId = null;

      async function loadList() {
        try {
          const { items = [] } = await ITCL_api('/api/admin/insights');
          const wrap = document.getElementById('listWrap');
          if (!items.length) {
            wrap.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted);">아직 글이 없습니다. "+ 새 글 작성"을 눌러 시작하세요.</div>';
            return;
          }
          wrap.innerHTML = `
            <table class="table">
              <thead><tr><th>상태</th><th>카테고리</th><th>제목</th><th>저자</th><th>수정일</th><th></th></tr></thead>
              <tbody>
                ${items.map(r => `
                  <tr>
                    <td><span class="badge ${r.published ? 'published' : 'draft'}">${r.published ? '게시' : '초안'}</span></td>
                    <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);">${ITCL_esc(r.category)}</span></td>
                    <td><strong>${ITCL_esc(r.title)}</strong><br><span style="font-size:12px;color:var(--muted);">/${ITCL_esc(r.slug)}</span></td>
                    <td>${ITCL_esc(r.author_name)}</td>
                    <td style="font-size:12px;color:var(--muted);">${ITCL_fmtDate(r.updated_at || r.created_at)}</td>
                    <td><button class="btn small secondary" data-edit="${r.id}">편집</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
          document.querySelectorAll('[data-edit]').forEach(b => {
            b.addEventListener('click', () => openEditor(b.dataset.edit));
          });
        } catch (e) {
          document.getElementById('listWrap').innerHTML = `<div class="alert error" style="margin:20px;">${ITCL_esc(e.message)}</div>`;
        }
      }

      function openEditor(id) {
        editingId = id || null;
        document.getElementById('view-list').style.display = 'none';
        document.getElementById('view-editor').style.display = '';
        document.getElementById('editorTitle').textContent = id ? '글 편집' : '새 글 작성';
        document.getElementById('deleteBtn').style.display = id ? '' : 'none';

        if (id) {
          ITCL_api('/api/admin/insights', { query: { id } }).then(({ item }) => {
            document.getElementById('f_title').value = item.title || '';
            document.getElementById('f_slug').value = item.slug || '';
            document.getElementById('f_excerpt').value = item.excerpt || '';
            document.getElementById('f_body').value = item.body_md || '';
            document.getElementById('f_category').value = item.category || 'trend';
            document.getElementById('f_author_name').value = item.author_name || '김덕진';
            document.getElementById('f_author_init').value = item.author_init || 'KD';
            document.getElementById('f_read_min').value = item.read_min || 5;
            document.getElementById('f_published').checked = !!item.published;
            document.getElementById('f_featured').checked = !!item.featured;
          }).catch(e => ITCL_toast(e.message, 'error'));
        } else {
          ['f_title','f_slug','f_excerpt','f_body'].forEach(i => document.getElementById(i).value = '');
          document.getElementById('f_category').value = 'trend';
          document.getElementById('f_author_name').value = '김덕진';
          document.getElementById('f_author_init').value = 'KD';
          document.getElementById('f_read_min').value = 5;
          document.getElementById('f_published').checked = false;
          document.getElementById('f_featured').checked = false;
        }
      }

      function closeEditor() {
        editingId = null;
        document.getElementById('view-editor').style.display = 'none';
        document.getElementById('view-list').style.display = '';
        loadList();
      }

      document.getElementById('newBtn').addEventListener('click', () => openEditor(null));
      document.getElementById('backBtn').addEventListener('click', closeEditor);

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const body = {
          title: document.getElementById('f_title').value.trim(),
          slug: document.getElementById('f_slug').value.trim() || undefined,
          excerpt: document.getElementById('f_excerpt').value,
          body_md: document.getElementById('f_body').value,
          category: document.getElementById('f_category').value,
          author_name: document.getElementById('f_author_name').value,
          author_init: document.getElementById('f_author_init').value,
          read_min: parseInt(document.getElementById('f_read_min').value) || 5,
          published: document.getElementById('f_published').checked,
          featured: document.getElementById('f_featured').checked,
        };
        if (!body.title) { ITCL_toast('제목을 입력하세요', 'error'); return; }

        try {
          if (editingId) {
            await ITCL_api('/api/admin/insights', { method: 'PUT', query: { id: editingId }, body });
          } else {
            const res = await ITCL_api('/api/admin/insights', { method: 'POST', body });
            editingId = res.item.id;
          }
          ITCL_toast('저장됨', 'success');
          // 목록으로 자동 복귀
          setTimeout(closeEditor, 800);
        } catch (e) {
          ITCL_toast('저장 실패: ' + e.message, 'error');
        }
      });

      document.getElementById('deleteBtn').addEventListener('click', async () => {
        if (!editingId) return;
        if (!confirm('정말 삭제하시겠습니까? 복구할 수 없습니다.')) return;
        try {
          await ITCL_api('/api/admin/insights', { method: 'DELETE', query: { id: editingId } });
          ITCL_toast('삭제됨', 'success');
          closeEditor();
        } catch (e) {
          ITCL_toast(e.message, 'error');
        }
      });

      loadList();
    })();
  </script>
</body>
</html>
