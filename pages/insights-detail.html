<script>
const POSTS={
  'ai-agent-paradigm':{catL:'트렌드',t:'AI 에이전트 시대, 조직은 무엇을 준비해야 하는가',a:'김덕진 소장',i:'KD',date:'2026.04.08',read:'8분',html:`
    <p class="lead">단순히 질문에 답하는 챗봇에서, 업무를 스스로 계획하고 도구를 호출해 "실행"하는 AI 에이전트로 — 2025년 하반기부터 가속된 이 전환은 이제 조직 단위 도입 단계로 들어섰다. 현장에서 마주한 질문은 기술보다 조직에 관한 것이었다.</p>
    <h2>"챗봇"과 "에이전트"의 근본적 차이</h2>
    <p>많은 기업이 여전히 에이전트를 "좀 더 똑똑한 챗봇"으로 이해하려 한다. 하지만 현장에 들어가보면 이 둘은 <strong>도입 난이도, 리스크 구조, 성과 측정 방식이 전혀 다르다.</strong> 챗봇은 "사람에게 답을 주는 도구"이고, 에이전트는 "사람을 대신해 무언가를 수행하는 주체"다. 이 차이가 인식되지 않으면 도입 후 6개월 안에 프로젝트는 거의 반드시 정체된다.</p>
    <h2>가장 먼저 바뀌어야 할 세 가지</h2>
    <h3>1. 권한과 감사로그 체계</h3>
    <p>에이전트가 실제로 업무를 수행한다는 것은, 어느 시점에 <strong>무엇을, 어떤 권한으로, 누구의 지시를 받아 수행했는지</strong>가 추적 가능해야 한다는 뜻이다. 기존 IAM 체계는 사람을 전제로 설계되어 있어, 에이전트를 일급 시민으로 다루지 못한다.</p>
    <h3>2. 의사결정 경계선</h3>
    <p>"에이전트가 어디까지 결정하고, 어디서부터 사람이 개입하는가?"는 도입 직후 반드시 부딪히는 질문이다. 이 경계선은 업무별로 다르게 정의되어야 하며, 시간이 지나며 계속 조정되어야 한다.</p>
    <blockquote>도입 1년차에 가장 자주 보는 실패는, 이 경계선을 미리 정의하지 않고 "알아서 잘해라" 상태로 에이전트를 풀어놓는 것이다.</blockquote>
    <h3>3. KPI 재설계</h3>
    <p>에이전트가 업무를 대신하는 순간, 기존 "업무량 기반 KPI"는 의미를 잃는다. 조직은 <strong>"사람이 기여한 가치"를 새로 정의</strong>해야 하고, 이 재정의 없이는 구성원의 저항을 피할 수 없다.</p>
    <h2>HR이 지금 시작해야 할 일</h2>
    <ul>
      <li><strong>직무기술서의 재작성:</strong> "무엇을 하는 사람인가"에서 "무엇을 판단하고 책임지는 사람인가"로</li>
      <li><strong>에이전트 리터러시 커리큘럼:</strong> 도구 사용법이 아닌, 에이전트를 감독하는 역량</li>
      <li><strong>평가 지표의 이원화:</strong> 개인 성과 + 에이전트와의 협업 효율</li>
    </ul>
    <h2>마치며</h2>
    <p>에이전트는 도구가 아니라 <strong>새로운 형태의 구성원</strong>이다. 이 관점을 받아들이는 조직이 다음 2년 동안 확실히 앞서나갈 것이고, 반대로 이 전환을 놓치는 조직은 기존 생산성 우위를 잃게 될 것이다. ITCL이 최근 임원 대상 프로그램에서 가장 많은 시간을 들이는 주제이기도 하다.</p>`},
  'physical-ai':{catL:'트렌드',t:'피지컬 AI: 2026년 산업 지형을 바꾸는 세 가지 신호',a:'김덕진 소장',i:'KD',date:'2026.04.01',read:'6분',html:`
    <p class="lead">CES 2026 현장에서, 그리고 최근 한 달간 쏟아진 로봇·자율주행 분야 투자 공시에서 공통적으로 확인된 신호 세 가지. 피지컬 AI는 더 이상 "미래 기술"이 아니라 이미 산업 지형을 바꾸고 있다.</p>
    <h2>신호 1: 휴머노이드의 공장 진입</h2>
    <p>2025년까지는 "시연 단계"였던 휴머노이드 로봇이, 2026년 들어 실제 제조 라인에 배치되기 시작했다. 핵심은 범용 휴머노이드 자체가 아니라, <strong>"학습된 동작의 조직 간 전이"</strong>가 가능해졌다는 점이다.</p>
    <h2>신호 2: 엔드투엔드 학습 기반 자율주행</h2>
    <p>규칙 기반 모듈을 결합하던 기존 자율주행 스택이, <strong>센서 → 판단 → 제어를 하나의 신경망으로 통합하는 방식</strong>으로 빠르게 전환되고 있다. 이는 학습 데이터의 양과 품질이 곧 성능이 된다는 뜻이고, 자동차 회사의 경쟁 지형이 데이터 전쟁으로 옮겨가고 있음을 의미한다.</p>
    <h2>신호 3: 의료·물류의 "손" 로봇</h2>
    <p>정밀한 그립이 필요한 분야 — 수술 보조, 약제 조제, 이커머스 피킹 — 에서 단일 목적 로봇이 빠르게 확산 중이다. 이쪽은 범용 휴머노이드보다 훨씬 빠른 ROI를 보여준다.</p>
    <h2>한국 기업이 준비해야 할 것</h2>
    <ul>
      <li>자사 공정·업무 중 "반복적 물리 동작"의 맵핑</li>
      <li>데이터 수집·라벨링 파이프라인 내재화</li>
      <li>로봇·사람 협업 설계 역량 확보</li>
    </ul>`},
  'workflow-thinking':{catL:'전략',t:'"워크플로 사고": AI 도입이 실패하는 진짜 이유',a:'김아람 이사',i:'KA',date:'2026.03.24',read:'7분',html:`
    <p class="lead">100명 넘는 실무자를 인터뷰하면서 확인한 사실 하나. AI를 "잘 쓰는 조직"과 "쓴다고만 하는 조직"의 차이는 도구나 스킬이 아니라, <strong>업무를 프로세스로 분해해서 보는 습관</strong>이었다.</p>
    <h2>도구는 같은데 왜 결과는 다른가</h2>
    <p>같은 ChatGPT, 같은 Claude를 쓰는데 어떤 팀은 주당 10시간을 절약하고, 어떤 팀은 오히려 검토 시간이 늘어난다. 현장에 들어가서 본 차이는 명확했다. 성공하는 팀은 업무를 <strong>"정보 수집 → 구조화 → 판단 → 산출 → 검증"</strong>의 단계로 쪼개 보고, 각 단계마다 AI의 강점과 사람의 강점을 분리한다.</p>
    <h2>워크플로 사고의 3단계</h2>
    <h3>1단계: 업무의 해체</h3>
    <p>"보고서 쓰기"가 아니라 "이 보고서를 쓰기 위해 내가 실제로 하는 12가지 마이크로 태스크"를 종이에 나열한다. 대부분의 사람이 이 단계에서 놀란다. 자기 업무를 이렇게 자세히 들여다본 적이 없기 때문이다.</p>
    <h3>2단계: 강점 매칭</h3>
    <p>각 마이크로 태스크마다 묻는다. 이건 AI가 더 잘하는가, 사람이 더 잘하는가, 아니면 둘이 함께해야 하는가?</p>
    <h3>3단계: 재조립</h3>
    <p>쪼갠 것을 다시 붙인다. 이때 <strong>AI 단계와 사람 단계 사이의 인터페이스</strong>가 핵심이다. AI가 만든 산출물을 사람이 어떻게 받고, 검토 기준이 무엇인지를 미리 합의하는 일이 결과 품질의 80%를 좌우한다.</p>
    <blockquote>AI 도입의 병목은 기술이 아니라 "업무를 들여다보는 훈련"이다.</blockquote>`}
};
function render(id){
  const p=POSTS[id]||POSTS['ai-agent-paradigm'];

    <section class="article-hero">
      <div class="crumb"><a href="../index.html">Home</a><span class="sep">/</span><a href="insights.html">Insights</a><span class="sep">/</span><span>${p.catL}</span></div>
      <span class="article-cat">● ${p.catL}</span>
      <h1 class="article-title">${p.t}</h1>
      <div class="article-meta">
        <div class="author"><div class="av">${p.i}</div>${p.a}</div>
        <span>·</span><span>${p.date}</span><span>·</span><span>${p.read} 읽기</span>
      </div>
    </section>
    <div class="article-thumb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>
    <article class="article-body">${p.html}</article>`;
  const others=Object.entries(POSTS).filter(([k])=>k!==id).slice(0,3);
  document.getElementById('related').innerHTML=others.map(([k,v])=>`
    <a class="rel-card" href="insights-detail.html?id=${k}">
      <div class="rel-cat">${v.catL}</div>
      <div class="rel-title">${v.t}</div>
    </a>`).join('');
}
const id=new URLSearchParams(location.search).get('id')||'ai-agent-paradigm';
render(id);
</script>
